<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" role="img" aria-label="Janus">
  <!-- Janus mark: circle badge, two faces — teal looks back, amber looks forward. INSPR / JANUS-271. -->
  <circle cx="60" cy="60" r="54" fill="none" stroke="#2a3550" stroke-width="6"/>
  <g fill="none" stroke-width="5.5" stroke-linecap="round" stroke-linejoin="round">
    <!-- left face (looking back, verdigris) -->
    <path stroke="#3d9a8b" d="M60 26
      C54 24 48 25 45 28
      L37 23 C36 29 38 33 42 35
      C39 40 38 45 39 50
      L34 58 L39 60
      L36 67 L41 69
      C40 74 42 79 47 82
      C51 85 54 86 55 90
      L55 96"/>
    <!-- right face (looking forward, amber) -->
    <path stroke="#c9913f" d="M60 26
      C66 24 72 25 75 28
      L83 23 C84 29 82 33 78 35
      C81 40 82 45 81 50
      L86 58 L81 60
      L84 67 L79 69
      C80 74 78 79 73 82
      C69 85 66 86 65 90
      L65 96"/>
  </g>
</svg>
