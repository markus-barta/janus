name: go-envelope
# Build/test the transitional Go envelope, and on a release tag produce a
# SIGNED image + SBOM + build provenance. This closes the long-standing irony
# that the envelope implements release_provenance/supply_chain_posture but had
# no release pipeline of its own (JANUS release-hygiene gap).
#
# No custom secrets required: ghcr push uses the built-in GITHUB_TOKEN, cosign
# signs keyless via OIDC, and provenance uses actions/attest-build-provenance.
on:
  push:
    branches: [main]
    paths: ['go-envelope/**', 'config/assurance/**', 'config/release-channels/**', 'scripts/**', '.github/workflows/go-envelope.yml']
  # Always report the branch-required Go check on pull requests. Pushes retain
  # the focused path filter above.
  pull_request:
  # Release the envelope image by pushing a tag like `go-envelope-v1.144`.
  release:
    types: [published]

permissions:
  contents: read

jobs:
  build-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: go-envelope
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v7
        with:
          go-version: '1.26.5'
          cache-dependency-path: go-envelope/go.sum
      - run: go build ./...
      - run: go run honnef.co/go/tools/cmd/staticcheck@v0.7.0 ./...
      - run: go run golang.org/x/vuln/cmd/govulncheck@v1.6.0 ./...
      - run: go vet ./...
      - run: go test ./...
      - name: cross-surface Go minimization proof
        run: python3 ../scripts/run-minimization-proof.py --stack go
      - name: Gitleaks history and negative fixture
        working-directory: .
        run: |
          go install github.com/zricethezav/gitleaks/v8@v8.30.1
          GITLEAKS_BIN="$(go env GOPATH)/bin/gitleaks" scripts/test-gitleaks.sh
      - name: scanner policy and negative fixtures
        working-directory: .
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          python3 scripts/check-security-gates.py --self-test
          scripts/check-source-release.py --self-test --verify-grandfathered
      - uses: aquasecurity/setup-trivy@3fb12ec12f41e471780db15c232d5dd185dcb514
        with:
          version: v0.72.0
      - name: verify installed scanner versions
        working-directory: .
        run: GITLEAKS_BIN="$(go env GOPATH)/bin/gitleaks" python3 scripts/check-security-gates.py --check-installed-tools --tool gitleaks --tool govulncheck --tool staticcheck --tool trivy
      - name: build and scan local candidate image
        working-directory: .
        run: |
          docker build -t janus-envelope:security go-envelope
          trivy image --scanners vuln --format json --output go-trivy.json janus-envelope:security
          python3 scripts/check-security-gates.py --trivy-report go-trivy.json --summary go-trivy-summary.json
      - uses: actions/upload-artifact@v6
        if: always()
        with:
          name: go-candidate-security-summary
          path: go-trivy-summary.json
          if-no-files-found: error

  image:
    # Only on a published GitHub Release whose tag starts with go-envelope-v.
    if: github.event_name == 'release' && startsWith(github.event.release.tag_name, 'go-envelope-v')
    needs: build-test
    runs-on: ubuntu-latest
    permissions:
      contents: write      # attach SBOM as a release asset
      packages: write      # push image to ghcr
      id-token: write      # cosign keyless (OIDC)
      attestations: write  # build provenance attestation
    env:
      IMAGE: ghcr.io/${{ github.repository }}/janus-envelope
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=raw,value=${{ github.event.release.tag_name }}
            type=sha
      - id: build
        uses: docker/build-push-action@v6
        with:
          context: go-envelope
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            JANUS_BUILD_COMMIT=${{ github.sha }}
            JANUS_BUILD_TIME=${{ github.event.release.published_at }}
      - uses: aquasecurity/setup-trivy@3fb12ec12f41e471780db15c232d5dd185dcb514
        with:
          version: v0.72.0
      - name: verify installed release scanner version
        working-directory: .
        run: python3 scripts/check-security-gates.py --check-installed-tools --tool trivy
      - name: scan exact published candidate digest
        working-directory: .
        run: |
          trivy image --scanners vuln --format json --output go-trivy.json "${IMAGE}@${{ steps.build.outputs.digest }}"
          python3 scripts/check-security-gates.py --trivy-report go-trivy.json --summary go-trivy-summary.json
      - uses: sigstore/cosign-installer@v3
      - name: sign and verify released source binding
        working-directory: .
        run: |
          python3 scripts/create-source-release-manifest.py \
            --repository "${{ github.repository }}" \
            --tag "${{ github.event.release.tag_name }}" \
            --commit "${{ github.sha }}" \
            --workflow ".github/workflows/go-envelope.yml" \
            --image "${IMAGE}" \
            --image-digest "${{ steps.build.outputs.digest }}" \
            --output source-release.json
          cosign sign-blob --yes --bundle source-release.sigstore.json source-release.json
          scripts/check-source-release.py --manifest source-release.json --bundle source-release.sigstore.json
          cosign verify-blob \
            --bundle source-release.sigstore.json \
            --certificate-identity "https://github.com/${{ github.repository }}/.github/workflows/go-envelope.yml@refs/tags/${{ github.event.release.tag_name }}" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            source-release.json
      - name: cosign sign (keyless)
        run: cosign sign --yes "${IMAGE}@${{ steps.build.outputs.digest }}"
      - name: SBOM (SPDX)
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.IMAGE }}@${{ steps.build.outputs.digest }}
          format: spdx-json
          output-file: sbom.spdx.json
      - name: upload SBOM release asset
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            sbom.spdx.json \
            source-release.json \
            source-release.sigstore.json \
            go-trivy-summary.json \
            --clobber
      - name: build provenance attestation
        uses: actions/attest-build-provenance@v1
        with:
          subject-name: ${{ env.IMAGE }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true
      - name: SPDX SBOM attestation
        uses: actions/attest@v4
        with:
          subject-name: ${{ env.IMAGE }}
          subject-digest: ${{ steps.build.outputs.digest }}
          sbom-path: sbom.spdx.json
          push-to-registry: true
          create-storage-record: false
