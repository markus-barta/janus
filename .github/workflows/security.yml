name: security

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  base-images:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: verify immutable GitHub Action pins and negative fixtures
        run: python3 scripts/check-action-pins.py --self-test
      - name: verify Warden smoke status excludes sensitive fields
        run: python3 scripts/smoke-warden-mcp.py --self-test
      - name: verify immutable base manifests and platforms
        run: |
          docker buildx version
          python3 scripts/test-docker-base-pins.py
          python3 scripts/check-docker-base-pins.py --verify-remote

  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: '1.26.5'
          cache: false
      - name: install Gitleaks
        run: go install github.com/zricethezav/gitleaks/v8@v8.30.1
      - name: scan history and prove the negative fixture
        run: GITLEAKS_BIN="$(go env GOPATH)/bin/gitleaks" ./scripts/test-gitleaks.sh
      - name: verify installed scanner version
        run: GITLEAKS_BIN="$(go env GOPATH)/bin/gitleaks" python3 scripts/check-security-gates.py --check-installed-tools --tool gitleaks
