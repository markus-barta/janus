name: security

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v7
        with:
          go-version: '1.26'
      - name: install Gitleaks
        run: go install github.com/zricethezav/gitleaks/v8@v8.30.1
      - name: scan history and prove the negative fixture
        run: GITLEAKS_BIN="$(go env GOPATH)/bin/gitleaks" ./scripts/test-gitleaks.sh
