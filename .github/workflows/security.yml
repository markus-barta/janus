name: security

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  base-images:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: verify immutable base manifests and platforms
        run: |
          docker buildx version
          python3 scripts/test-docker-base-pins.py
          python3 scripts/check-docker-base-pins.py --verify-remote

  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v7
        with:
          go-version: '1.26.5'
          cache: false
      - name: install Gitleaks
        run: go install github.com/zricethezav/gitleaks/v8@v8.30.1
      - name: scan history and prove the negative fixture
        run: GITLEAKS_BIN="$(go env GOPATH)/bin/gitleaks" ./scripts/test-gitleaks.sh
      - name: verify installed scanner version
        run: GITLEAKS_BIN="$(go env GOPATH)/bin/gitleaks" python3 scripts/check-security-gates.py --check-installed-tools --tool gitleaks
