name: rust
on:
  push:
    branches: [main]
    paths:
      - 'crates/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'rust-toolchain.toml'
      - 'devenv.nix'
      - 'flake.nix'
      - 'flake.lock'
      - 'examples/**'
      - 'scripts/**'
      - 'Dockerfile.engine'
      - 'Dockerfile.engine.dockerignore'
      - '.github/workflows/rust.yml'
  pull_request:
    paths:
      - 'crates/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'rust-toolchain.toml'
      - 'devenv.nix'
      - 'flake.nix'
      - 'flake.lock'
      - 'examples/**'
      - 'scripts/**'
      - 'Dockerfile.engine'
      - 'Dockerfile.engine.dockerignore'
      - '.github/workflows/rust.yml'
  # Release the Rust engine image by publishing a tag like `rust-engine-v0.1.0`.
  release:
    types: [published]

permissions:
  contents: read

concurrency:
  group: rust-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - uses: cachix/install-nix-action@v31
      - name: install smoke dependencies
        run: sudo apt-get update && sudo apt-get install -y age
      - name: format
        run: cargo fmt --all -- --check
      - name: clippy
        run: cargo clippy --all-targets --all-features -- -D warnings
      - name: build
        run: cargo build --all-targets --locked
      - name: nix package
        run: nix build .#janus-engine
      - name: engine release assurance gate
        run: scripts/assure-engine-release.sh

  image:
    # Only on a published GitHub Release whose tag starts with rust-engine-v.
    # The check job above is the release-blocking engine assurance gate.
    if: github.event_name == 'release' && startsWith(github.event.release.tag_name, 'rust-engine-v')
    needs: check
    runs-on: ubuntu-latest
    permissions:
      contents: write      # attach SBOM as a release asset
      packages: write      # push image to ghcr
      id-token: write      # cosign keyless (OIDC)
      attestations: write  # build provenance attestation
    env:
      IMAGE: ghcr.io/${{ github.repository }}/janus-engine
    steps:
      - uses: actions/checkout@v4
      - name: verify release tag matches workspace version
        run: scripts/check-engine-release-tag.sh "${{ github.event.release.tag_name }}"
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=raw,value=${{ github.event.release.tag_name }}
            type=sha
      - id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.engine
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
      - uses: sigstore/cosign-installer@v3
      - name: cosign sign (keyless)
        run: cosign sign --yes "${IMAGE}@${{ steps.build.outputs.digest }}"
      - name: SBOM (SPDX)
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.IMAGE }}@${{ steps.build.outputs.digest }}
          format: spdx-json
          output-file: rust-engine-sbom.spdx.json
      - name: upload SBOM release asset
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ github.event.release.tag_name }}" rust-engine-sbom.spdx.json --clobber
      - name: build provenance attestation
        uses: actions/attest-build-provenance@v1
        with:
          subject-name: ${{ env.IMAGE }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true
      - name: verify published engine digest
        env:
          GH_TOKEN: ${{ github.token }}
          JANUS_PUBLISHED_ENGINE_IMAGE: ${{ env.IMAGE }}
          JANUS_PUBLISHED_ENGINE_TAG: ${{ github.event.release.tag_name }}
          JANUS_PUBLISHED_ENGINE_DIGEST: ${{ steps.build.outputs.digest }}
          JANUS_PUBLISHED_ENGINE_REPO: ${{ github.repository }}
          JANUS_PUBLISHED_ENGINE_SIGNER_WORKFLOW: ${{ github.repository }}/.github/workflows/rust.yml
          JANUS_PUBLISHED_ENGINE_REQUIRE_COSIGN: "1"
        run: scripts/smoke-published-engine.sh
