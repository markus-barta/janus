name: rust
on:
  push:
    branches: [main]
    paths:
      - 'crates/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'rust-toolchain.toml'
      - 'devenv.nix'
      - 'flake.nix'
      - 'flake.lock'
      - 'examples/**'
      - 'config/assurance/**'
      - 'config/release-channels/**'
      - 'config/migrations/**'
      - 'fixtures/release-admission/**'
      - 'fixtures/migrations/**'
      - 'scripts/**'
      - 'Dockerfile.engine'
      - 'Dockerfile.engine.dockerignore'
      - '.github/workflows/rust.yml'
  pull_request:
    paths:
      - 'crates/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'rust-toolchain.toml'
      - 'devenv.nix'
      - 'flake.nix'
      - 'flake.lock'
      - 'examples/**'
      - 'config/assurance/**'
      - 'config/release-channels/**'
      - 'config/migrations/**'
      - 'fixtures/release-admission/**'
      - 'fixtures/migrations/**'
      - 'scripts/**'
      - 'Dockerfile.engine'
      - 'Dockerfile.engine.dockerignore'
      - '.github/workflows/rust.yml'
  # Release the Rust engine image by publishing a tag like `rust-engine-v0.1.0`.
  release:
    types: [published]

permissions:
  contents: read

concurrency:
  group: rust-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v7
        with:
          go-version: '1.26.5'
          cache: false
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - uses: cachix/install-nix-action@v31
      - name: install smoke dependencies
        run: sudo apt-get update && sudo apt-get install -y age
      - name: install pinned security tools
        run: |
          cargo install cargo-audit --version 0.22.2 --locked
          go install github.com/zricethezav/gitleaks/v8@v8.30.1
      - name: release security policy and negative fixtures
        run: |
          python3 scripts/check-release-docs.py
          python3 scripts/check-security-gates.py --self-test
          scripts/check-source-release.py --self-test
          scripts/check-rust-audit.py --self-test
          GITLEAKS_BIN="$(go env GOPATH)/bin/gitleaks" scripts/test-gitleaks.sh
      - name: format
        run: cargo fmt --all -- --check
      - name: clippy
        run: cargo clippy --all-targets --all-features -- -D warnings
      - name: build
        run: cargo build --all-targets --locked
      - name: nix package
        run: nix build .#janus-engine
      - name: engine release assurance gate
        run: scripts/assure-engine-release.sh
      - uses: aquasecurity/setup-trivy@3fb12ec12f41e471780db15c232d5dd185dcb514
        with:
          version: v0.72.0
      - name: build and smoke exact local candidate image
        run: scripts/smoke-engine-container.sh
      - name: scan candidate image and emit value-free summary
        run: |
          trivy image --scanners vuln --format json --output rust-trivy.json janus-engine:smoke
          python3 scripts/check-security-gates.py --trivy-report rust-trivy.json --summary rust-trivy-summary.json
      - uses: actions/upload-artifact@v6
        if: always()
        with:
          name: rust-candidate-security-summary
          path: rust-trivy-summary.json
          if-no-files-found: error

  image:
    # Only on a published GitHub Release whose tag starts with rust-engine-v.
    # The check job above is the release-blocking engine assurance gate.
    if: github.event_name == 'release' && startsWith(github.event.release.tag_name, 'rust-engine-v')
    needs: check
    runs-on: ubuntu-latest
    permissions:
      contents: write      # attach SBOM as a release asset
      packages: write      # push image to ghcr
      id-token: write      # cosign keyless (OIDC)
      attestations: write  # build provenance attestation
    env:
      IMAGE: ghcr.io/${{ github.repository }}/janus-engine
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: verify release tag matches workspace version
        run: scripts/check-engine-release-tag.sh "${{ github.event.release.tag_name }}"
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=raw,value=${{ github.event.release.tag_name }}
            type=sha
      - id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.engine
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
      - uses: aquasecurity/setup-trivy@3fb12ec12f41e471780db15c232d5dd185dcb514
        with:
          version: v0.72.0
      - name: scan exact published candidate digest
        run: |
          trivy image --scanners vuln --format json --output rust-trivy.json "${IMAGE}@${{ steps.build.outputs.digest }}"
          python3 scripts/check-security-gates.py --trivy-report rust-trivy.json --summary rust-trivy-summary.json
      - uses: sigstore/cosign-installer@v3
      - name: sign and verify released source binding
        run: |
          python3 scripts/create-source-release-manifest.py \
            --repository "${{ github.repository }}" \
            --tag "${{ github.event.release.tag_name }}" \
            --commit "${{ github.sha }}" \
            --workflow ".github/workflows/rust.yml" \
            --image "${IMAGE}" \
            --image-digest "${{ steps.build.outputs.digest }}" \
            --output source-release.json
          cosign sign-blob --yes --bundle source-release.sigstore.json source-release.json
          scripts/check-source-release.py --manifest source-release.json --bundle source-release.sigstore.json
          cosign verify-blob \
            --bundle source-release.sigstore.json \
            --certificate-identity "https://github.com/${{ github.repository }}/.github/workflows/rust.yml@refs/tags/${{ github.event.release.tag_name }}" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            source-release.json
      - name: cosign sign (keyless)
        run: cosign sign --yes "${IMAGE}@${{ steps.build.outputs.digest }}"
      - name: SBOM (SPDX)
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.IMAGE }}@${{ steps.build.outputs.digest }}
          format: spdx-json
          output-file: rust-engine-sbom.spdx.json
      - name: upload SBOM release asset
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            rust-engine-sbom.spdx.json \
            source-release.json \
            source-release.sigstore.json \
            rust-trivy-summary.json \
            --clobber
      - name: build provenance attestation
        uses: actions/attest@v4
        with:
          subject-name: ${{ env.IMAGE }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true
          create-storage-record: false
      - name: SPDX SBOM attestation
        uses: actions/attest@v4
        with:
          subject-name: ${{ env.IMAGE }}
          subject-digest: ${{ steps.build.outputs.digest }}
          sbom-path: rust-engine-sbom.spdx.json
          push-to-registry: true
          create-storage-record: false
      - name: verify published engine digest
        env:
          GH_TOKEN: ${{ github.token }}
          JANUS_PUBLISHED_ENGINE_IMAGE: ${{ env.IMAGE }}
          JANUS_PUBLISHED_ENGINE_TAG: ${{ github.event.release.tag_name }}
          JANUS_PUBLISHED_ENGINE_DIGEST: ${{ steps.build.outputs.digest }}
          JANUS_RELEASE_CHANNEL_POLICY: config/release-channels/v1.json
          JANUS_RELEASE_CHANNEL: stable
          JANUS_PRODUCT_MODE: enterprise
          JANUS_PREVIOUS_PRODUCT_MODE: enterprise
          JANUS_PUBLISHED_ENGINE_ADMISSION_RECEIPT: rust-engine-admission.json
        run: scripts/smoke-published-engine.sh
      - name: upload admission receipt
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ github.event.release.tag_name }}" rust-engine-admission.json --clobber
